site_name: "Demo — Documentation Skills Toolkit"
site_description: "Example docs site built with the Documentation Skills Toolkit"
site_url: "https://lampd-2157.github.io/documentation-skills-toolkit/"

repo_name: lampd-2157/documentation-skills-toolkit
repo_url: https://github.com/lampd-2157/documentation-skills-toolkit
edit_uri: ""

theme:
  name: material
  language: vi
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.path
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - header.autohide
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - content.code.select
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/note-sticky
      tip: fontawesome/solid/lightbulb
      warning: fontawesome/solid/triangle-exclamation
      danger: fontawesome/solid/skull-crossbones
      info: fontawesome/solid/circle-info

plugins:
  - search:
      lang: [vi, en]
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.keys
  - pymdownx.smartsymbols
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lampd-2157/documentation-skills-toolkit
  generator: false

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/extra.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - assets/javascripts/tablesort.js

copyright: "Copyright &copy; 2026 DulapReal — Documentation Skills Toolkit"

nav:
  - Home: index.md
  - Tags: tags.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
  - Operations:
    - Runbooks:
      - Proxmox VM (T1): operations/runbooks/proxmox-vm-runbook.md
    - Network Topology (T5): operations/network-topology-example.md
    - Postmortem (T6): operations/postmortem-example.md
    - Maintenance Window (T7): operations/maintenance-window-example.md
  - Development:
    - ADR:
      - "ADR-001: MkDocs (T2)": development/adr/adr-001-mkdocs.md
      - "ADR-002: PostgreSQL — MADR (T9)": development/adr/adr-002-choose-postgresql.md
      - "ADR-003: API Versioning — Lightweight (T10)": development/adr/adr-003-api-versioning.md
    - Release Notes (T8): development/release-notes-example.md
  - Training:
    - Git Basics (T4): training/training-module-example.md
    - Docker Knowledge Check (T11): training/docker-basics-knowledge-check.md
  - Guides:
    - How-to:
      - Google Workspace New User (T3): guides/how-to/google-workspace-new-user.md
      - Ansible Network Automation (T3): guides/how-to/ansible-network-howto.md

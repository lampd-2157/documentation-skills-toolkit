name: Doc Health Dashboard

on:
  schedule:
    - cron: '0 8 * * 1'  # Weekly Monday 8:00 UTC
  workflow_dispatch:  # Manual trigger

jobs:
  health-dashboard:
    name: Generate Health Dashboard
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate dashboard
        id: dashboard
        run: |
          OUTPUT=$(python3 scripts/generate_health_dashboard.py)
          echo "dashboard<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update dashboard issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Doc Health Dashboard — Weekly Report';
            const body = `${{ steps.dashboard.outputs.dashboard }}

            ---
            *Auto-generated by [Health Dashboard CI](.github/workflows/health-dashboard.yml) — ${new Date().toISOString().split('T')[0]}*`;

            // Find existing open issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-dashboard',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['health-dashboard', 'automated'],
              });
              console.log('Created new dashboard issue');
            }

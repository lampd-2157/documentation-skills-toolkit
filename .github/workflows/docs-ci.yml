name: Docs CI

on:
  pull_request:
    paths: ['**.md', 'skills/**', 'scripts/**', 'docs/**', 'config/**', 'templates/**', 'evals/**', 'demo-site/**']
  push:
    branches: [main]
    paths: ['**.md', 'skills/**', 'scripts/**', 'docs/**', 'config/**', 'templates/**', 'evals/**', 'demo-site/**']

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#demo-site" "#templates" --config config/.markdownlint.json

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        run: |
          npx markdown-link-check \
            --config config/link-check.json \
            --quiet \
            $(find skills/ docs/ -name '*.md' | head -30)

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate skill files
        run: python3 scripts/validate_skill.py

  build-demo:
    name: Build Demo Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'demo-site/requirements.txt'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build MkDocs (strict)
        run: cd demo-site && mkdocs build --strict

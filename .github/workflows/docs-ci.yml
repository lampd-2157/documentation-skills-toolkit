name: Docs CI

on:
  pull_request:
    paths: ['**.md', 'skills/**', 'scripts/**', 'docs/**', 'config/**', 'templates/**', 'evals/**', 'demo-site/**']
  push:
    branches: [main]
    paths: ['**.md', 'skills/**', 'scripts/**', 'docs/**', 'config/**', 'templates/**', 'evals/**', 'demo-site/**']

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#demo-site" "#templates" --config config/.markdownlint.json

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        run: |
          npx markdown-link-check \
            --config config/link-check.json \
            --quiet \
            $(find skills/ docs/ -name '*.md' ! -name 'skill-template.md' | head -30)

  validate-skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate skill files
        run: python3 scripts/validate_skill.py

  score-docs:
    name: Doc Quality Score
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Score documentation quality
        run: python3 scripts/score_docs.py --ci

      - name: Post score as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const output = execSync('python3 scripts/score_docs.py --markdown').toString();
            const body = output + '\n\n---\n*Auto-generated by Doc Quality Score CI*';

            // Find existing comment to update (avoid spam)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Doc Quality Score')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

  build-demo:
    name: Build Demo Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'demo-site/requirements.txt'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Build MkDocs (strict)
        run: cd demo-site && mkdocs build --strict
